<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sensas · Outils GM</title>
  <link rel="stylesheet" href="style-commun.css">
  <style>
    body { overflow: hidden; }

    .main-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
    }

    .main-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      opacity: .55;
    }

    .tools-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 52px;
    }

    .tool-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .18s cubic-bezier(.16,1,.3,1), opacity .18s;
    }
    .tool-btn:hover  { transform: scale(1.08); }
    .tool-btn:active { transform: scale(.94); opacity: .7; }

    .tool-btn img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.45));
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
    }
    #splash.go {
      pointer-events: auto;
      animation: splash-in .42s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes splash-in {
      0%   { opacity: 0; transform: scale(.4); border-radius: 50%; }
      60%  { opacity: 1; transform: scale(1.6); border-radius: 20%; }
      100% { opacity: 1; transform: scale(3);   border-radius: 0; }
    }
  </style>
</head>
<body>

<div id="splash"></div>

<div class="main-wrap">

  <img src="images/logo.webp" alt="Sensas" class="main-logo"
       onerror="this.style.display='none'">

  <div class="tools-row">

    <button class="tool-btn" onclick="navigate('gout.html', '#7c3aed')" aria-label="Salle des Goûts">
      <img src="images/sens/bouche.png" alt="Bouche">
    </button>

    <button class="tool-btn" onclick="navigate('ouie.html', '#c0152a')" aria-label="Salle des Mimes">
      <img src="images/sens/oreille.png" alt="Oreille">
    </button>

  </div>

</div>

<script>
function navigate(url, color) {
  var splash = document.getElementById('splash');
  splash.style.background = color;
  splash.classList.add('go');
  setTimeout(function() {
    window.location.href = url;
  }, 380);
}
</script>

</body>
</html>
