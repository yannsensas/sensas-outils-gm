<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sensas · Outils GM</title>
  <link rel="stylesheet" href="style-commun.css">
  <style>
    body { overflow: hidden; }

    .main-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 44px;
      padding: 24px;
    }

    /* Logo cropé — grand, texte SENSAS uniquement */
    .main-logo {
      width: min(80vw, 340px);
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* Rang des sens */
    .tools-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Bouton actif */
    .tool-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .18s cubic-bezier(.16,1,.3,1), opacity .18s;
    }
    .tool-btn:hover  { transform: scale(1.1); }
    .tool-btn:active { transform: scale(.93); opacity: .7; }
    .tool-btn img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.45));
    }

    /* Bouton inactif — N&B 75% */
    .tool-btn-soon {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tool-btn-soon img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      filter: grayscale(100%) brightness(.75);
      transition: filter .15s;
    }
    .tool-btn-soon:hover img { filter: grayscale(100%) brightness(.92); }

    /* Animation shake */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-9px) rotate(-4deg); }
      35%  { transform: translateX(9px)  rotate(4deg); }
      55%  { transform: translateX(-6px) rotate(-2deg); }
      72%  { transform: translateX(5px)  rotate(2deg); }
      85%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }
    .tool-btn-soon.shaking img {
      animation: shake .45s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* Overlay splash */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
    }
    #splash.go {
      pointer-events: auto;
      animation: splash-in .42s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes splash-in {
      0%   { opacity: 0; transform: scale(.4); border-radius: 50%; }
      60%  { opacity: 1; transform: scale(1.6); border-radius: 20%; }
      100% { opacity: 1; transform: scale(3);   border-radius: 0; }
    }
  </style>
</head>
<body>

<div id="splash"></div>

<div class="main-wrap">

  <!-- Logo cropé : texte SENSAS uniquement -->
  <img src="images/logocrop.webp" alt="Sensas" class="main-logo"
       onerror="this.style.display='none'">

  <div class="tools-row">

    <!-- Oeil — bientôt -->
    <button class="tool-btn-soon" onclick="shake(this)" aria-label="Bientôt disponible">
      <img src="images/sens/oeil.png" alt="Oeil">
    </button>

    <!-- Main — bientôt -->
    <button class="tool-btn-soon" onclick="shake(this)" aria-label="Bientôt disponible">
      <img src="images/sens/main.png" alt="Main">
    </button>

    <!-- Bouche — actif — violet #9333c8 (= --accent gout) -->
    <button class="tool-btn" onclick="navigate('gout.html', '#9333c8')" aria-label="Salle des Goûts">
      <img src="images/sens/bouche.png" alt="Bouche">
    </button>

    <!-- Nez — bientôt -->
    <button class="tool-btn-soon" onclick="shake(this)" aria-label="Bientôt disponible">
      <img src="images/sens/nez.png" alt="Nez">
    </button>

    <!-- Oreille — actif — rouge #c0152a (= --accent ouie) -->
    <button class="tool-btn" onclick="navigate('ouie.html', '#c0152a')" aria-label="Salle des Mimes">
      <img src="images/sens/oreille.png" alt="Oreille">
    </button>

  </div>

</div>

<script>
function navigate(url, color) {
  var splash = document.getElementById('splash');
  splash.style.background = color;
  splash.classList.add('go');
  setTimeout(function() { window.location.href = url; }, 380);
}

function shake(btn) {
  btn.classList.remove('shaking');
  void btn.offsetWidth;
  btn.classList.add('shaking');
  btn.addEventListener('animationend', function() {
    btn.classList.remove('shaking');
  }, { once: true });
}
</script>

</body>
</html>
