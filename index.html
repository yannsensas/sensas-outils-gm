<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sensas · Outils GM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style-commun.css">
  <style>
    .main-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* Hero */
    .main-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .main-logo {
      width: 82px;
      height: 82px;
      border-radius: 22px;
      object-fit: cover;
      border: 1px solid var(--border-strong);
      box-shadow: 0 12px 32px rgba(0,0,0,.5);
    }
    .main-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 9vw, 3rem);
      letter-spacing: .07em;
      color: var(--text);
      line-height: 1;
    }
    .main-hero p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Grille outils */
    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 16px 24px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s, background .15s, border-color .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(192,21,42,.18);
      transform: translateY(-2px);
    }
    .tool-card:active {
      transform: scale(.97);
      opacity: .85;
    }

    .tool-img {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: cover;
      border: 1px solid var(--border-strong);
      box-shadow: 0 6px 18px rgba(0,0,0,.4);
    }

    .tool-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      letter-spacing: .06em;
      color: var(--text);
      text-align: center;
    }
    .tool-desc {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    /* Badge à venir */
    .tool-card.soon {
      opacity: .42;
      pointer-events: none;
      cursor: default;
    }
    .soon-badge {
      font-size: .62rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 8px;
    }

    /* Footer */
    .main-footer {
      margin-top: 36px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .5;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="main-wrap">

  <div class="main-hero">
    <img src="images/sensas-logo.png" alt="Sensas" class="main-logo"
         onerror="this.style.display='none'">
    <h1>SENSAS</h1>
    <p>Outils Game Master</p>
  </div>

  <div class="tools-grid">

    <!-- Bouche — Salle des Goûts -->
    <a class="tool-card" href="gout.html">
      <img src="images/sens/bouche.png" alt="Bouche" class="tool-img"
           onerror="this.style.display='none'">
      <div>
        <div class="tool-name">BOUCHE</div>
        <div class="tool-desc">Goûts</div>
      </div>
    </a>

    <!-- Oreille — Salle des Mimes -->
    <a class="tool-card" href="ouie.html">
      <img src="images/sens/oreille.png" alt="Oreille" class="tool-img"
           onerror="this.style.display='none'">
      <div>
        <div class="tool-name">OREILLE</div>
        <div class="tool-desc">Mimes</div>
      </div>
    </a>

  </div>

  <div class="main-footer">v1.0 &mdash; Sensas &copy; 2025</div>

</div>

</body>
</html>
